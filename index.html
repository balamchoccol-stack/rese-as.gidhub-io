<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reseñas de la grasa</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>📷 Mi Galería</h1>
    <div>
        <button id="adminBtn" class="btn btn-admin">Panel Admin</button>
        <button id="logoutBtn" class="btn logout-btn" style="display:none">Salir</button>
    </div>
</header>

<!-- Login Modal -->
<div id="loginModal" class="modal-overlay">
    <div class="modal">
        <h2>🔐 Acceso Admin</h2>
        <input type="password" id="adminPass" placeholder="Contraseña">
        <div class="modal-actions">
            <button class="btn btn-close" onclick="closeLogin()">Cancelar</button>
            <button class="btn btn-admin" onclick="checkLogin()">Entrar</button>
        </div>
    </div>
</div>

<!-- Upload Panel -->
<div id="uploadPanel" class="upload-panel">
    <h2>📤 Subir nueva foto</h2>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <h3>📁 Haz clic para seleccionar foto</h3>
        <p>JPG, PNG, WEBP — máximo 5 MB</p>
    </div>
    <input type="file" id="fileInput" accept="image/*">
    <input type="text" id="photoTitle" placeholder="Título de la foto">
    <textarea id="photoDesc" rows="2" placeholder="Descripción (opcional)"></textarea>
    <button class="btn btn-submit" onclick="uploadPhoto()">Subir Foto</button>
</div>

<!-- Gallery -->
<div id="gallery" class="gallery">
    <div class="empty-msg">
        <div class="empty-icon">📭</div>
        <p>No hay fotos aún.</p>
        <p class="empty-sub">Sube la primera desde el panel de admin.</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
